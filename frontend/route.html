    <meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="css/style.css">

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center fw-bold" href="index.html">
    <img src="image/logo2.png" alt="logo" class="me-2" style="height:40px;">
    Bus Scheduling
</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="buses.html">Buses</a></li>
            <li class="nav-item"><a class="nav-link" href="crew.html">Crew</a></li>

        </ul>
    </div>
</div>

<!-- ✅ Main Container -->

<div class="container mt-5">

<div class="row g-4">

    <!-- ✅ SHOW ROUTES -->
    <div class="col-md-4">
        <div class="card p-3 shadow h-100">
            <h5 class="text-center mb-3">📋 Show Routes</h5>

            <button class="btn btn-primary w-100 mb-2" onclick="loadRoutes()">Load Routes</button>

            <ul id="routeList" class="list-group"></ul>
        </div>
    </div>

    <!-- ✅ ADD ROUTE -->
    <div class="col-md-4">
        <div class="card p-3 shadow h-100">
            <h5 class="text-center mb-3">➕ Add Route</h5>

            <form id="addRouteForm">
                <div class="mb-2">
                    <input type="text" id="routeName" class="form-control" placeholder="Route Name" required>
                </div>
                <div class="mb-2">
                    <input type="text" id="routeId" class="form-control" placeholder="Route ID" required>
                </div>

                <button type="submit" class="btn btn-success w-100">Add Route</button>
            </form>
        </div>
    </div>

    <!-- ✅ CHECK OVERLAP -->
    <div class="col-md-4">
        <div class="card p-3 shadow h-100">
            <h5 class="text-center mb-3">🔍 Check Overlap</h5>

            <form id="overlapForm">
                <div class="mb-2">
                    <input type="text" id="checkoverlap" class="form-control"
                        placeholder="Stop IDs (e.g. [1,2,3])" required>
                </div>

                <button type="submit" class="btn btn-warning w-100">Check Overlap</button>
            </form>

            <div id="overlapResult" class="mt-3"></div>
        </div>
    </div>

</div>


</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- ✅ JS Logic -->

<script>

// Load Routes
function loadRoutes() {

    document.getElementById("routeList").innerHTML =
        "<li class='list-group-item'>Loading...</li>";

    fetch("http://automated-bus-backend.onrender.com/api/get-routes")

    .then(res => res.json())

    .then(data => {

        let list = "";

        if (data.data.length === 0) {

            list =
            "<li class='list-group-item'>No routes found</li>";

        } else {

            data.data.forEach(route => {

                list += `
                <li class="list-group-item">
                    <b>${route.route_name}</b>
                    <br>
                    Stops: ${route.stops.length}
                </li>
                `;
            });
        }

        document.getElementById("routeList").innerHTML = list;
    })

    .catch(err => {

        console.error(err);

        document.getElementById("routeList").innerHTML =
            "<li class='list-group-item text-danger'>Error loading routes</li>";
    });
}

// Add Route
document.getElementById("addRouteForm")
.addEventListener("submit", function(e) {

    e.preventDefault();

    const routeName =
        document.getElementById("routeName").value;

    const stopIds =
        JSON.parse(document.getElementById("stopIds").value);

    fetch("http://automated-bus-backend.onrender.com/api/add-route", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            routeName,
            stopIds
        })
    })

    .then(res => res.json())

    .then(data => {

        alert(data.message);

        document.getElementById("addRouteForm").reset();

        loadRoutes();
    })

    .catch(err => {

        console.error(err);

        alert("Error adding route");
    });
});

// Check Overlap
document.getElementById("overlapForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const stops = document.getElementById("checkoverlap").value;

    fetch("http://automated-bus-backend.onrender.com/api/routes/check-overlap", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            stopIds: JSON.parse(stops)
        })
    })
    .then(res => res.json())
    .then(data => {
        let html = `
            <div class="alert alert-info">${data.message}</div>
        `;
        if (data.overlappingRoutes) {
            data.overlappingRoutes.forEach(route => {
                html += `
                    <div class="card p-2 mb-2">
                        <b>${route.route_name}</b>
                        <br>
                        Shared Stops:
                        ${route.sharedStops.join(", ")}
                        <br>
                        Overlap Count:
                        ${route.overlapCount}
                    </div>
                `;
            });
        }
        document.getElementById("overlapResult").innerHTML = html;
    })
    .catch(err => console.error(err));
});

document.getElementById("overlapResult").innerHTML = html;

</script>

</body>
</html>
