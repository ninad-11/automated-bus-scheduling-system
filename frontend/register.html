<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">

    <div class="card p-4 shadow form-card">
        <h3 class="text-center mb-3">Register</h3>

        <form id="registerForm">
            <div class="mb-3">
                <input type="text" id="regUsername" class="form-control" placeholder="Username" required>
            </div>

            <div class="mb-3">
                <input type="password" id="regPassword" class="form-control" placeholder="Password" required>
            </div>

            <button type="submit" class="btn btn-success w-100">Register</button>
        </form>

        <p class="text-center mt-3">
            Already have an account? 
            <a href="login.html">Login</a>
        </p>

        <p id="registerMsg" class="text-center mt-2"></p>
    </div>

</div>

<script src="js/auth.js"></script>
</body>
</html>
